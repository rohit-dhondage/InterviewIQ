# Updated on 2026-05-07
# ===============================
# SERVER CONFIG
# ===============================
server.port=8080

# ===============================
# DATABASE CONFIG (MySQL example)
# ===============================
spring.datasource.url=jdbc:mysql://localhost:3306/interviewiq
spring.datasource.username=root
spring.datasource.password=${DB_PASSWORD}
spring.ai.openai.api-key=${OPENAI_API_KEY}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ===============================
# JWT CONFIG
# ===============================


# ===============================
# LOGGING (Optional)
# ===============================
logging.level.org.springframework.security=DEBUG

# ===============================
# FILE UPLOAD CONFIG
# ===============================
# By default Spring Boot limits file uploads to 1MB — too small for resumes.
# We raise these limits so users can upload PDFs up to 10MB.
# max-file-size   = single file limit
# max-request-size = total request body limit (same value is fine for single-file uploads)
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB